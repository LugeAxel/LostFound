name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy app
        run: |
          cd /var/www/LostFound
          git pull origin main
          npm install
          cd /var/www/LostFound/backend
          npm install
          cd ..
          NODE_OPTIONS="--max-old-space-size=4096" npm run build
          sudo systemctl restart nginx
          pm2 restart all